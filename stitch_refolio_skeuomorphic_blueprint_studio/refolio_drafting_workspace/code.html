<style>
        .drafting-grid {
            background-image: 
                linear-gradient(to right, rgba(114, 121, 110, 0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(114, 121, 110, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .drafting-tape {
            background-color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05), inset 0 0 10px rgba(255,255,255,0.5);
            position: relative;
        }
        .drafting-tape::before, .drafting-tape::after {
            content: '';
            position: absolute;
            top: -2px; bottom: -2px;
            width: 4px;
            background: rgba(255,255,255,0.8);
            border-left: 1px dashed rgba(0,0,0,0.1);
        }
        .drafting-tape::before { left: -2px; transform: rotate(-2deg); }
        .drafting-tape::after { right: -2px; transform: rotate(2deg); }

        .sticky-note {
            background-color: #ffdf96;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.1);
            position: relative;
            transform: rotate(-1deg);
        }
        .sticky-note::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.05), transparent);
        }
        .id-card {
            background: linear-gradient(135deg, #ffffff 0%, #f0f1ea 100%);
            box-shadow: 0 12px 32px rgba(0,0,0,0.15), inset 0 2px 0 rgba(255,255,255,0.8);
            border: 1px solid #e2e3dc;
            position: relative;
        }
        .playing-card {
            background: #ffffff;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            border: 1px solid #e2e3dc;
            transform: rotate(1deg);
        }
        .stamp-beta {
            color: #ba1a1a;
            border: 2px solid #ba1a1a;
            transform: rotate(-5deg);
            opacity: 0.8;
            mask-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" fill="white" /><circle cx="50" cy="50" r="40" fill="black" opacity="0.1" /></svg>');
            -webkit-mask-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" fill="white" /><circle cx="50" cy="50" r="40" fill="black" opacity="0.1" /></svg>');
        }
